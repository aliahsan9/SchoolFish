<div class="login-wrapper d-flex align-items-center justify-content-center">

  <div class="login-card row g-0 shadow-lg">

    <!-- LEFT SIDE (FORM) -->
    <div class="col-lg-6 left-panel p-5">

      <div class="logo mb-4">🎓</div>

      <h2 class="fw-bold">Welcome Back</h2>
      <p class="text-muted mb-4">Login to your account</p>

      <div class="alert alert-danger" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()">

        <div class="mb-3">
          <label>Email</label>
          <input class="form-control" type="email" placeholder="Enter email" formControlName="email" />
        </div>

        <div class="mb-3">
          <label>Password</label>
          <input class="form-control" type="password" placeholder="Enter password" formControlName="password" />
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3 small">
          <div>
            <input type="checkbox" class="form-check-input me-2">
            Remember me
          </div>
          <a href="#">Forgot Password?</a>
        </div>

        <button class="btn login-btn w-100"
                [disabled]="form.invalid || loading">
          {{ loading ? 'Signing in...' : 'Sign In →' }}
        </button>

      </form>

      <p class="mt-3 small">
        Don’t have an account?
        <a routerLink="/register">Sign up →</a>
      </p>

    </div>

    <!-- RIGHT SIDE (VISUAL) -->
    <div class="col-lg-6 right-panel d-none d-lg-flex flex-column justify-content-center align-items-center">

      <h2 class="text-white fw-bold mb-4">Welcome Back</h2>

      <img src="assets/school.webp" class="img-fluid illustration" />

    </div>

  </div>

</div>
