<div class="register-wrapper">

  <div class="register-container row g-0 ">

    <!-- LEFT -->
    <div class="col-lg-6 left-panel text-center">

      <div class="content">

        <div class="brand">
          <span>🎓</span>
          <h4>SchoolFish</h4>
        </div>

        <h2>Create Account </h2>
        <p>Start managing your school in minutes</p>

        <div class="alert alert-danger" *ngIf="errorMessage()">
          {{ errorMessage() }}
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()">

          <!-- NAME -->
          <div class="row">
            <div class="col-md-6 mb-3 form-floating">
              <input class="form-control" placeholder="First Name" formControlName="firstName">
              <label>First Name</label>
            </div>

            <div class="col-md-6 mb-3 form-floating">
              <input class="form-control" placeholder="Last Name" formControlName="lastName">
              <label>Last Name</label>
            </div>
          </div>

          <!-- EMAIL -->
          <div class="form-floating mb-3">
            <input class="form-control" placeholder="Email" formControlName="email">
            <label>Email address</label>
          </div>

          <!-- PHONE -->
          <div class="form-floating mb-3">
            <input class="form-control" placeholder="Phone" formControlName="phoneNumber">
            <label>Phone Number (optional)</label>
          </div>

          <!-- PASSWORD -->
          <div class="form-floating mb-2 position-relative">
            <input [type]="showPassword() ? 'text' : 'password'"
                   class="form-control"
                   placeholder="Password"
                   formControlName="password">
            <label>Password</label>

            <span class="toggle-password" (click)="togglePassword()">
              {{ showPassword() ? '🙈' : '👁️' }}
            </span>
          </div>

          <!-- PASSWORD STRENGTH -->
          <div class="strength mb-3">
            <div class="bar" [ngClass]="'lvl-' + passwordStrength()"></div>
          </div>

          <!-- ROLE SELECTOR -->
          <div class="role-selector mb-4">
            <div *ngFor="let role of roles"
                 (click)="setRole(role)"
                 [class.active]="form.value.roleName === role">
              {{ role }}
            </div>
          </div>

          <!-- BUTTON -->
          <button class="btn signup-btn w-100"
                  [disabled]="form.invalid || loading()">

            <span *ngIf="!loading()">Create Account →</span>
            <span *ngIf="loading()" class="spinner-border spinner-border-sm"></span>
          </button>

        </form>

        <p class="mt-4 text-center small">
          Already have an account?
          <a routerLink="/login">Sign in →</a>
        </p>

      </div>
    </div>

    <!-- RIGHT -->
    <div class="col-lg-6 right-panel d-none d-lg-flex">

      <div class="overlay"></div>

      <div class="visual-content">
        <h1>Join Smart Schools</h1>
        <p>Digitize operations. Scale effortlessly.</p>

        <img src="assets/school.webp" alt="visual">
      </div>

    </div>

  </div>

</div>
