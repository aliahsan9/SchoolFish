<div class="register-wrapper d-flex align-items-center justify-content-center">

  <div class="register-card row g-0 shadow-lg">

    <!-- LEFT SIDE (FORM) -->
    <div class="col-lg-6 left-panel p-5">

      <div class="logo mb-4">🎓</div>

      <h2 class="fw-bold">Create Account</h2>
      <p class="text-muted mb-4">Please enter your details</p>

      <div class="alert alert-danger" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()">

        <div class="mb-3">
          <label>Full Name</label>
          <div class="d-flex gap-2">
            <input class="form-control" placeholder="First name" formControlName="firstName" />
            <input class="form-control" placeholder="Last name" formControlName="lastName" />
          </div>
        </div>

        <div class="mb-3">
          <label>Email</label>
          <input class="form-control" placeholder="Email" formControlName="email" />
        </div>

        <div class="mb-3">
          <label>Password</label>
          <input type="password" class="form-control" placeholder="Password" formControlName="password" />
        </div>

        <div class="mb-3">
          <label>Phone Number</label>
          <input class="form-control" placeholder="Phone number" formControlName="phoneNumber" />
        </div>

        <div class="mb-3">
          <select class="form-select" formControlName="roleName">
            <option value="Admin">Admin</option>
            <option value="Teacher">Teacher</option>
            <option value="Student">Student</option>
          </select>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3 small">
          <div>
            <input type="checkbox" class="form-check-input me-2">
            Remember me
          </div>
          <a href="#">Forgot Password?</a>
        </div>

        <button class="btn signup-btn w-100"
                [disabled]="form.invalid || loading">
          {{ loading ? 'Creating...' : 'SignUp →' }}
        </button>

      </form>

      <p class="mt-3 small">
        Already Have an Account?
        <a routerLink="/login">Login to Account →</a>
      </p>

    </div>

    <!-- RIGHT SIDE (VISUAL) -->
    <div class="col-lg-6 right-panel d-none d-lg-flex flex-column justify-content-center align-items-center">

      <h2 class="text-white fw-bold mb-4">SignUp Now</h2>

      <img src="assets/school.webp" class="img-fluid illustration" />

    </div>

  </div>

</div>
